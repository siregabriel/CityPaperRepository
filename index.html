<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repository - Senior Living Communities</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC5oHKF_FYWPZHGFoNNahmrvgfAhYehnAI",
            authDomain: "city-paper-repository.firebaseapp.com",
            projectId: "city-paper-repository",
            storageBucket: "city-paper-repository.firebasestorage.app",
            messagingSenderId: "626588890303",
            appId: "1:626588890303:web:ac48add55435d4c91c020a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window._db = db;
        window._firestoreDoc = doc;
        window._firestoreSetDoc = setDoc;
        window._firestoreGetDoc = getDoc;

        // Signal that Firebase is ready
        window.dispatchEvent(new Event('firebase-ready'));
    </script>

    <style>
        * {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: #f3f5fb;
            animation: float 20s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(30px, -30px) rotate(5deg); }
            66% { transform: translate(-20px, 20px) rotate(-5deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade-in {
            animation: fadeIn 0.6s ease-out forwards;
        }

        .glassmorphism {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.04);
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, currentColor, transparent);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .stat-card:hover::before {
            opacity: 0.3;
        }

        .stat-card:hover {
            background: rgba(255, 255, 255, 0.7);
            transform: translateY(-4px);
            box-shadow: 0 12px 40px 0 rgba(31, 38, 135, 0.08);
        }

        .community-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.35);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .community-card:hover {
            background: rgba(255, 255, 255, 0.6);
            box-shadow: 0 12px 40px 0 rgba(31, 38, 135, 0.08);
            transform: translateY(-2px);
        }

        .file-item {
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .file-item:hover {
            background: rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 16px 0 rgba(31, 38, 135, 0.06);
            transform: translateX(4px);
        }

        .file-item.highlight {
            background: rgba(255, 248, 225, 0.5);
            border-left: 3px solid #fbbf24;
            backdrop-filter: blur(10px);
        }

        .search-box {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            transition: all 0.3s ease;
        }

        .search-box:focus-within {
            background: rgba(255, 255, 255, 0.7);
            box-shadow: 0 0 0 3px rgba(34, 94, 100, 0.1);
            border-color: rgba(34, 94, 100, 0.3);
        }

        .header-gradient {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            position: relative;
            z-index: 10;
        }

        .header-gradient img {
            transition: all 0.3s ease;
            filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.05));
        }

        .header-gradient img:hover {
            opacity: 1 !important;
            transform: scale(1.05);
            filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.1));
        }

        .state-header {
            background: linear-gradient(135deg, rgba(248, 250, 252, 0.5) 0%, rgba(241, 245, 249, 0.5) 100%);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
        }

        .download-btn {
            background: white;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
            box-shadow: 0 2px 8px rgba(34, 94, 100, 0.2);
            color: gray!important;;
        }

        .download-btn:hover {
            background: white;
        }

        .download-btn:active {
            transform: translateY(0);
        }

        .file-badge {
            background: rgba(241, 245, 249, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(226, 232, 240, 0.4);
        }

        .search-icon {
            color: #225e64;
            opacity: 0.6;
        }

        .folder-card {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            position: relative;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            min-height: 180px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .folder-card::before {
            content: '';
            position: absolute;
            top: -8px;
            left: 20px;
            width: 80px;
            height: 8px;
            background: linear-gradient(135deg, rgba(34, 94, 100, 0.4) 0%, rgba(34, 94, 100, 0.6) 100%);
            border-radius: 4px 4px 0 0;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-bottom: none;
        }

        .folder-card:hover {
            background: rgba(255, 255, 255, 0.7);
            transform: translateY(-8px);
            box-shadow: 0 16px 48px 0 rgba(31, 38, 135, 0.12);
        }

        .folder-card:hover::before {
            background: linear-gradient(135deg, rgba(34, 94, 100, 0.6) 0%, rgba(34, 94, 100, 0.8) 100%);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            padding: 20px;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal-content {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 24px;
            max-width: 800px;
            width: 100%;
            max-height: 85vh;
            overflow: hidden;
            box-shadow: 0 24px 64px rgba(31, 38, 135, 0.2);
            transform: scale(0.9) translateY(20px);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .modal-overlay.active .modal-content {
            transform: scale(1) translateY(0);
        }

        .modal-header {
            background: linear-gradient(135deg, rgba(248, 250, 252, 0.8) 0%, rgba(241, 245, 249, 0.8) 100%);
            backdrop-filter: blur(10px);
            padding: 24px 32px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-body {
            padding: 24px 32px;
            max-height: calc(85vh - 100px);
            overflow-y: auto;
        }

        .close-btn {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(226, 232, 240, 0.4);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .close-btn:hover {
            background: rgba(255, 255, 255, 0.9);
            transform: rotate(90deg);
        }

        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.1); }
        ::-webkit-scrollbar-thumb { background: rgba(34, 94, 100, 0.3); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(34, 94, 100, 0.5); }

        /* Loading overlay */
        #loadingOverlay {
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(6px);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            transition: opacity 0.4s ease;
        }
        #loadingOverlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(34,94,100,0.15);
            border-top-color: #225e64;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- Loading Overlay -->
    <div id="loadingOverlay">
        <div class="spinner"></div>
        <p style="color:#225e64; font-size:14px; font-weight:400; letter-spacing:0.03em;">Loading repository…</p>
    </div>

    <div class="min-h-screen pb-12 relative">
        <!-- Header -->
        <header class="header-gradient sticky top-0 z-50 shadow-sm">
            <div class="max-w-7xl mx-auto px-6 py-6">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <img src="logo-new.png" alt="City Paper Co" class="h-8 w-auto opacity-90">
                    </div>
                    <div class="flex items-center gap-4">
                        <img src="atlas-logo.png" alt="Atlas Senior Living" class="h-8 w-auto opacity-90">
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="max-w-7xl mx-auto px-6 py-12 relative z-10">

            <!-- Quick Links Upload Section (collapsible, folder-card style) -->
            <div class="mb-10 animate-fade-in" style="position:relative; padding-top:8px;">
                <!-- Folder tab -->
                <div style="position:absolute; top:0; left:20px; width:120px; height:8px; background:linear-gradient(135deg,rgba(34,94,100,0.4) 0%,rgba(34,94,100,0.6) 100%); border-radius:4px 4px 0 0; border:1px solid rgba(255,255,255,0.3); border-bottom:none;"></div>
                <!-- Card -->
                <div style="background:#f3f5fb; backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border-radius:16px; overflow:hidden;">
                    <!-- Toggle header -->
                    <button
                        onclick="toggleQuickLinks()"
                        style="width:100%; display:flex; align-items:center; justify-content:space-between; padding:18px 24px; background:transparent; border:none; cursor:pointer; transition:background 0.2s ease;"
                        onmouseover="this.style.background='rgba(255,255,255,0.3)'"
                        onmouseout="this.style.background='transparent'"
                    >
                        <div style="display:flex; align-items:center; gap:10px;">
                            <svg style="width:20px;height:20px;color:#225e64;opacity:0.8;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" />
                            </svg>
                            <span style="font-size:25px; font-weight:500!important; color:gray; font-family:'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-weight:600; color:#525a68;">+</span>
                        </div>
                        <svg id="quickLinksChevron" style="width:18px;height:18px;color:#9ca3af;transition:transform 0.3s ease;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                        </svg>
                    </button>
                    <!-- Collapsible body -->
                    <div id="quickLinksBody" style="max-height:0; overflow:hidden; transition:max-height 0.4s cubic-bezier(0.4,0,0.2,1);">
                        <div style="padding:0 24px 24px; border-top:1px solid rgba(255,255,255,0.35);">
                            <div style="height:16px;"></div>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4" style="margin-bottom:16px;">
                                <p style="color:#374151">For Atlas staff only:</p>
                                <br>
                                <div>
                                    <label style="display:block; font-size:13px; font-weight:500; color:#374151; margin-bottom:6px;">Community / State</label>
                                    <select id="communitySelect" style="width:100%; height:42px; padding:10px 12px; border:1px solid rgba(209,213,219,0.8); border-radius:10px; background:rgba(255,255,255,0.7); font-size:14px; color:#374151; outline:none;">
                                        <option value="">-- Select a community --</option>
                                    </select>
                                </div>
                                <div>
                                    <label style="display:block; font-size:13px; font-weight:500; color:#374151; margin-bottom:6px;">File Name* (required)</label>
                                    <input type="text" id="customName" placeholder="E.g.: Special Documentation"
                                        style="width:100%; padding:10px 12px; border:1px solid rgba(209,213,219,0.8); border-radius:10px; background:rgba(255,255,255,0.7); font-size:14px; color:#374151; outline:none; box-sizing:border-box;">
                                </div>
                            </div>
                            <div style="margin-bottom:16px;">
                                <label style="display:block; font-size:13px; font-weight:500; color:#374151; margin-bottom:6px;">Hosted Files URLs</label>
                                <textarea id="linksPaste"
                                    placeholder="Paste URLs here (one per line)&#10;E.g.: https://atlasprint.s3.us-east-1.amazonaws.com/CityPaper/Wildcat+Senior+Living+Letterhead.ai"
                                    style="width:100%; padding:10px 12px; border:1px solid rgba(209,213,219,0.8); border-radius:10px; background:rgba(255,255,255,0.7); font-size:13px; font-family:monospace; color:#374151; outline:none; resize:none; box-sizing:border-box;"
                                    rows="3"></textarea>
                            </div>
                            <div style="display:flex; gap:10px;">
                                <button onclick="addQuickLinks()"
                                    class="download-btn"
                                    style="padding:10px 20px; border-radius:10px; color:white; font-size:14px; font-weight:500; cursor:pointer;">
                                    ➕ Add Link
                                </button>
                                <button onclick="clearLinks()"
                                    style="padding:10px 20px; background:rgba(243,244,246,0.8); border:1px solid rgba(209,213,219,0.6); border-radius:10px; color:#6b7280; font-size:14px; font-weight:500; cursor:pointer; transition:background 0.2s ease;"
                                    onmouseover="this.style.background='rgba(229,231,235,0.9)'"
                                    onmouseout="this.style.background='rgba(243,244,246,0.8)'">
                                    🗑️ Clear
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Search Bar -->
            <div class="mb-10 animate-fade-in">
                <div class="search-box px-6 py-4 rounded-2xl focus-within:outline-none transition-all">
                    <div class="flex items-center gap-3">
                        <svg class="w-5 h-5 search-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                        <input type="text" id="searchInput"
                            placeholder="Search by community name, location, or document..."
                            class="w-full bg-transparent focus:outline-none text-gray-700 placeholder-gray-400 font-light">
                    </div>
                </div>
            </div>

            <!-- States and Communities -->
            <div id="statesContainer" class="space-y-10"></div>

            <!-- Empty State -->
            <div id="emptyState" class="hidden">
                <div class="glassmorphism rounded-2xl p-16 text-center">
                    <svg class="mx-auto h-20 w-20 text-gray-300 mb-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                    </svg>
                    <h3 class="text-2xl font-light text-gray-600 mt-4">No communities found</h3>
                    <p class="text-gray-400 mt-3 font-light">Try adjusting your search terms</p>
                </div>
            </div>
        </main>

        <!-- Modal -->
        <div id="fileModal" class="modal-overlay">
            <div class="modal-content">
                <div class="modal-header">
                    <div>
                        <h3 id="modalTitle" class="text-2xl font-light text-gray-700 tracking-tight"></h3>
                        <p id="modalLocation" class="text-gray-400 text-sm mt-1 font-light flex items-center gap-2">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                            </svg>
                            <span></span>
                        </p>
                    </div>
                    <button class="close-btn" onclick="closeModal()">
                        <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                </div>
                <div class="modal-body">
                    <div id="modalFilesList" class="space-y-3"></div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer class="mt-16 pt-10 border-t border-white/30 relative z-10">
            <div class="max-w-7xl mx-auto px-6 pb-8 text-center">
                <p class="text-gray-400 font-light text-sm tracking-wide">&copy; 2024 Senior Living Communities. All rights reserved.</p>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
